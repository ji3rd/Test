<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 골드 시세</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0e;--bg2:#161614;--bg3:#1e1e1b;--bg4:#252520;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.14);--b3:rgba(255,255,255,0.22);
  --t1:#f0efe8;--t2:#9a9990;--t3:#5a5a55;
  --accent:#d4a843;--accent2:#a07d28;
  --green:#3db87a;--red:#e05c5c;--red-bg:rgba(224,92,92,0.1);
  --blue:#5b9cf6;
  --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;
  --r:10px;--rl:14px
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;padding:24px 16px;font-size:14px}
.page{max-width:860px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-size:16px;font-weight:600}
.badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:flex;align-items:center;gap:6px;background:var(--bg3);border:0.5px solid var(--b2);border-radius:20px;padding:5px 12px;font-size:11px}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bdot.green{background:var(--green);animation:pulse 2s infinite}
.bdot.amber{background:var(--accent);animation:pulse 2s infinite}
.bdot.red{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.bval{font-family:var(--mono);font-size:12px;color:var(--t1)}
.blbl{color:var(--t3);font-size:11px}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.tab{font-size:12px;padding:8px 16px;border-radius:var(--r);border:0.5px solid var(--b2);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;white-space:nowrap}
.tab:hover{background:var(--bg4);color:var(--t1)}
.tab.active{background:var(--accent);color:#0f0f0e;border-color:var(--accent);font-weight:600}
.tab .tag{font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(0,0,0,0.2);font-weight:500}
.panel{display:none}
.panel.active{display:block}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.scard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--rl);padding:14px 16px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.scard.gold::before{background:linear-gradient(90deg,var(--accent),transparent)}
.scard.green::before{background:linear-gradient(90deg,var(--green),transparent)}
.scard.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.scard .sl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.scard .sv{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--t1)}
.scard .ss{font-size:11px;color:var(--t2);font-family:var(--mono);margin-top:2px}
.open-all{margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.open-all-btn{font-size:11px;padding:6px 14px;border-radius:var(--r);border:0.5px solid var(--b2);background:var(--bg3);color:var(--t1);cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;transition:all .15s}
.open-all-btn:hover{background:var(--bg4);border-color:var(--b3)}
.updated-at{font-size:11px;color:var(--t3);margin-left:auto}
.table-wrap{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--b);background:var(--bg3)}
.section-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.refresh-btn{font-size:11px;padding:4px 10px;border-radius:var(--r);border:0.5px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.refresh-btn:hover{background:var(--bg3);color:var(--t1)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{font-size:10px;color:var(--t3);font-weight:500;text-align:left;padding:8px 14px;border-bottom:0.5px solid var(--b);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
thead th.r{text-align:right}
tbody tr{border-bottom:0.5px solid var(--b);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.03)}
tbody td{padding:10px 14px;color:var(--t2);font-family:var(--mono);white-space:nowrap}
tbody td.lc{font-family:var(--sans);color:var(--t1)}
tbody td.r{text-align:right}
tbody td.accent{color:var(--accent);font-weight:500}
.badge-min{font-size:9px;background:rgba(61,184,122,0.15);color:var(--green);border:0.5px solid rgba(61,184,122,0.3);padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}
.link-btn{display:inline-flex;align-items:center;font-size:10px;padding:3px 8px;border-radius:6px;background:var(--bg3);border:0.5px solid var(--b2);color:var(--t2);text-decoration:none;transition:all .15s;font-family:var(--sans)}
.link-btn:hover{background:var(--bg4);color:var(--t1)}
.status-box{padding:24px;text-align:center;color:var(--t3);font-size:13px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.proxy-status{font-size:11px;color:var(--t3);margin-top:6px}
.debug-box{background:var(--bg3);border:0.5px solid var(--b2);border-radius:var(--r);padding:12px;margin:12px 0;font-size:10px;font-family:var(--mono);color:var(--t3);white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;text-align:left}
.calc-card{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--rl);padding:18px 20px;margin-bottom:20px}
.calc-title{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.calc-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
.fgrp{display:flex;flex-direction:column;gap:5px;flex:1;min-width:100px}
.fgrp label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
input[type=number]{font-size:13px;font-family:var(--mono);padding:8px 12px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--bg3);color:var(--t1);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,168,67,0.15)}
input::placeholder{color:var(--t3)}
.calc-btn{font-size:12px;padding:9px 18px;border-radius:var(--r);border:none;background:var(--accent);color:#0f0f0e;cursor:pointer;font-weight:600;white-space:nowrap;height:38px;flex-shrink:0}
.calc-btn:hover{background:#e0b650}
.calc-result{background:var(--bg3);border:0.5px solid var(--b);border-radius:var(--r);padding:14px 16px;display:none}
.calc-result.show{display:block}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--b);font-size:13px}
.rrow:last-child{border-bottom:none;padding-top:10px;margin-top:4px}
.rrow .rl{color:var(--t2)}
.rrow .rv{font-family:var(--mono);color:var(--t1);font-weight:500}
.rrow .rv.total{color:var(--accent);font-size:16px}
.rrow .rv.green{color:var(--green)}
@media(max-width:600px){
  .summary-row{grid-template-columns:1fr 1fr}
  body{padding:14px 10px}
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">⚔️</div>
      <span class="logo-text">게임 골드 시세</span>
    </div>
    <div class="badges">
      <div class="badge"><span class="bdot green"></span><span class="blbl">USD/KRW</span><span class="bval" id="fx-val">로딩중...</span></div>
      <div class="badge"><span class="bdot amber" id="st-dot"></span><span class="bval" id="st-lbl">대기중</span></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('le')" id="tab-le">🗡️ 라스트에포크<span class="tag">골드</span></div>
    <div class="tab" onclick="switchTab('poe2')" id="tab-poe2">💀 POE2<span class="tag">골드</span></div>
    <div class="tab" onclick="switchTab('poe')" id="tab-poe">🌀 POE<span class="tag">시즌골드</span></div>
  </div>

  <div id="panel-le" class="panel active"></div>
  <div id="panel-poe2" class="panel"></div>
  <div id="panel-poe" class="panel"></div>
</div>

<script>
const GAMES = {
  le:   { name:'라스트에포크', url:'https://m.itemmania.com/sell/list.html?search_game=5489&search_goods=money' },
  poe2: { name:'POE2',         url:'https://m.itemmania.com/sell/list.html?search_game=5166&search_goods=money' },
  poe:  { name:'POE 시즌',     url:'https://m.itemmania.com/sell/list_search.html?search_game=1835&search_server=10196&search_goods=money' }
};
let cache = {}, usdKrw = 1380;

/* ── EXCHANGE RATE ── */
async function fetchRate(){
  try{
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const j = await r.json();
    if(j.rates?.KRW){ usdKrw=j.rates.KRW; document.getElementById('fx-val').textContent=Math.round(usdKrw).toLocaleString('ko-KR')+'원'; }
  }catch(e){}
}

/* ── MULTI PROXY FETCH ── */
async function fetchWithProxy(url, proxyName, transform){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 8000);
  try{
    const res = await fetch(proxyName(url), {signal:ctrl.signal});
    clearTimeout(t);
    if(!res.ok) return null;
    return await transform(res);
  }catch(e){ clearTimeout(t); return null; }
}

async function fetchHtml(gameUrl, setMsg){
  // 프록시 1: allorigins JSON
  setMsg('프록시 1/4 시도중...');
  let html = await fetchWithProxy(gameUrl,
    u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    async r=>{ const j=await r.json(); return j.contents||null; }
  );
  if(html && html.length > 200) return html;

  // 프록시 2: allorigins raw
  setMsg('프록시 2/4 시도중...');
  html = await fetchWithProxy(gameUrl,
    u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    async r=>r.text()
  );
  if(html && html.length > 200) return html;

  // 프록시 3: corsproxy.io
  setMsg('프록시 3/4 시도중...');
  html = await fetchWithProxy(gameUrl,
    u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    async r=>r.text()
  );
  if(html && html.length > 200) return html;

  // 프록시 4: codetabs
  setMsg('프록시 4/4 시도중...');
  html = await fetchWithProxy(gameUrl,
    u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    async r=>r.text()
  );
  return (html && html.length > 200) ? html : null;
}

async function fetchListings(gameKey){
  const game = GAMES[gameKey];
  setStatus('amber','로딩중...');

  const panel = document.getElementById('panel-'+gameKey);
  const html = await fetchHtml(game.url, msg => {
    panel.innerHTML = `<div class="status-box"><span class="spin"></span>아이템매니아 데이터 수집중...<div class="proxy-status">${msg}</div></div>`;
  });

  if(!html){
    setStatus('red','모든 프록시 실패');
    return null;
  }

  const items = parseItemmania(html, game.url);

  if(!items || items.length === 0){
    // 디버그: 가져온 HTML 일부 보여주기
    const preview = html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').substring(0,800);
    cache[gameKey] = {items:null, rawPreview: preview, time: new Date()};
    setStatus('red','파싱 실패');
    return null;
  }

  cache[gameKey] = {items, time: new Date()};
  setStatus('green','업데이트 완료');
  return items;
}

/* ── PARSE ── */
function parseItemmania(html, baseUrl){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  let items = [];

  // 셀렉터 시도
  const trySelectors = [
    '.sell_list > li', '.list > li', 'ul.list li',
    '.goods_list li', '.item_list li', '.board_list li',
    '.sell_item', '.list_item', 'table.list tbody tr',
    '#list_body tr', '.itemList li'
  ];

  for(const sel of trySelectors){
    const els = doc.querySelectorAll(sel);
    if(els.length >= 2){
      els.forEach(el => {
        const item = parseEl(el, baseUrl);
        if(item) items.push(item);
      });
      if(items.length >= 2) break;
      items = [];
    }
  }

  // 셀렉터 실패 → 전체 텍스트 파싱
  if(items.length < 2){
    items = parseFromText(html, baseUrl);
  }

  return items?.length >= 1 ? items : null;
}

function parseEl(el, baseUrl){
  const text = el.textContent||'';

  // 가격: 숫자+원 또는 콤마 포함 5자리 이상 숫자
  const priceM = text.match(/([0-9]{1,3}(?:,[0-9]{3})+|[0-9]{4,7})\s*원/);
  if(!priceM) return null;
  const price = parseInt(priceM[1].replace(/,/g,''));
  if(price < 500 || price > 9999999) return null;

  // 수량
  const qtyM = text.match(/([0-9,]+)\s*(?:G\b|골드|GOLD)/i)
             || text.match(/([0-9,]+)\s*만골드/i);
  const qty = qtyM ? qtyM[1] : '-';

  // 판매자
  const sellerEl = el.querySelector('.member_id,.nick,.id,.seller,.user_id');
  const seller = sellerEl?.textContent?.trim()
    || [...el.querySelectorAll('*')].map(e=>e.textContent.trim())
        .find(t => /^[가-힣a-zA-Z0-9_]{2,15}$/.test(t) && !/[원골드]/.test(t))
    || '판매자';

  // 링크
  const a = el.querySelector('a[href]');
  const href = a?.getAttribute('href')||'';
  const link = href.startsWith('http') ? href
    : href.startsWith('/') ? 'https://m.itemmania.com'+href
    : baseUrl;

  return {seller: seller.substring(0,16).trim(), qty, price, link};
}

function parseFromText(html, baseUrl){
  const items = [];
  // HTML 태그 제거 후 줄 단위 파싱
  const text = html
    .replace(/<script[\s\S]*?<\/script>/gi,'')
    .replace(/<style[\s\S]*?<\/style>/gi,'')
    .replace(/<[^>]+>/g,'\n');

  const lines = text.split(/\n/).map(l=>l.trim()).filter(l=>l.length>0);

  for(let i=0; i<lines.length; i++){
    const l = lines[i];
    // 가격 패턴: "1,500원" 또는 "1500원"
    const priceM = l.match(/^([0-9]{1,3}(?:,[0-9]{3})+|[0-9]{4,7})원?$/)
                || l.match(/([0-9]{1,3}(?:,[0-9]{3})+)\s*원/);
    if(!priceM) continue;
    const price = parseInt(priceM[1].replace(/,/g,''));
    if(price < 500 || price > 9999999) continue;

    // 앞뒤 줄에서 판매자, 수량 찾기
    let seller = '', qty = '-';
    for(let j=Math.max(0,i-5); j<Math.min(lines.length,i+5); j++){
      if(j===i) continue;
      const ll = lines[j];
      if(/^[가-힣a-zA-Z0-9_]{2,15}$/.test(ll) && !/[원골드0-9,]/.test(ll)) seller=ll;
      const qm = ll.match(/([0-9,]+)\s*(?:G\b|골드)/i);
      if(qm) qty = qm[1];
    }

    if(seller || items.length < 10){
      items.push({seller: seller||'판매자'+(items.length+1), qty, price, link:baseUrl});
    }
  }

  // 중복 가격 제거
  const seen = new Set();
  return items.filter(it=>{
    const k = it.price+'_'+it.seller;
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

/* ── FORMAT ── */
const fmtW = n => n.toLocaleString('ko-KR')+'원';
const fmtN = s => parseInt(String(s).replace(/,/g,'')).toLocaleString();

/* ── RENDER ── */
function renderPanel(key, items){
  const game = GAMES[key];
  const panel = document.getElementById('panel-'+key);
  const c = cache[key];
  const timeStr = c?.time ? c.time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';

  if(!items || items.length === 0){
    const debugHtml = c?.rawPreview
      ? `<div style="padding:0 16px 16px"><p style="font-size:12px;color:var(--t2);margin-bottom:8px">가져온 HTML 미리보기 (파싱 실패):</p><div class="debug-box">${c.rawPreview}</div></div>`
      : '';
    panel.innerHTML = `
      <div class="open-all" style="padding:0">
        <a class="open-all-btn" href="${game.url}" target="_blank">🔗 아이템매니아에서 직접 보기</a>
        <button class="open-all-btn" onclick="refreshTab('${key}')">⟳ 다시 시도</button>
      </div>
      ${debugHtml}
      ${renderCalc(key,[])}`;
    return;
  }

  items.sort((a,b)=>a.price-b.price);
  const minP = items[0].price;
  const avgP = Math.round(items.reduce((s,i)=>s+i.price,0)/items.length);

  const rows = items.slice(0,25).map((it,i)=>`
    <tr onclick="window.open('${it.link}','_blank')">
      <td class="lc">${i+1}. ${it.seller}${i===0?'<span class="badge-min">최저</span>':''}</td>
      <td class="r">${it.qty!=='-'?fmtN(it.qty)+' G':'-'}</td>
      <td class="r accent">${fmtW(it.price)}</td>
      <td class="r"><a class="link-btn" href="${it.link}" target="_blank" onclick="event.stopPropagation()">구매→</a></td>
    </tr>`).join('');

  panel.innerHTML = `
    <div class="summary-row">
      <div class="scard gold"><div class="sl">최저가</div><div class="sv">${fmtW(minP)}</div><div class="ss">가장 저렴</div></div>
      <div class="scard green"><div class="sl">평균가</div><div class="sv">${fmtW(avgP)}</div><div class="ss">현재 평균</div></div>
      <div class="scard blue"><div class="sl">판매자</div><div class="sv">${items.length}명</div><div class="ss">현재 등록</div></div>
    </div>
    <div class="open-all">
      <a class="open-all-btn" href="${game.url}" target="_blank">🔗 아이템매니아 전체 목록</a>
      <span class="updated-at">⟳ ${timeStr} 기준</span>
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <span class="section-title">판매자 목록 (가격 낮은 순)</span>
        <button class="refresh-btn" onclick="refreshTab('${key}')">⟳ 새로고침</button>
      </div>
      <table>
        <thead><tr><th>판매자</th><th class="r">수량</th><th class="r">가격</th><th class="r"></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${renderCalc(key, items)}`;
}

function renderCalc(key, items){
  const minP = items.length > 0 ? items[0].price : 0;
  return `<div class="calc-card">
    <div class="calc-title">💰 구매 비용 계산기</div>
    <div class="calc-row">
      <div class="fgrp"><label>원하는 골드 수량</label><input type="number" id="cq-${key}" placeholder="예) 100000" min="1"></div>
      <div class="fgrp"><label>단가 (원/1골드)</label><input type="number" id="cp-${key}" placeholder="${minP>0?minP:'직접 입력'}" value="${minP>0?minP:''}"></div>
      <button class="calc-btn" onclick="calc('${key}')">계산</button>
    </div>
    <div class="calc-result" id="cr-${key}"></div>
  </div>`;
}

function calc(key){
  const qty = parseFloat(document.getElementById('cq-'+key).value);
  const price = parseFloat(document.getElementById('cp-'+key).value);
  const el = document.getElementById('cr-'+key);
  if(isNaN(qty)||qty<=0||isNaN(price)||price<=0){alert('수량과 단가를 입력해주세요');return}
  const total = Math.round(qty*price);
  const usd = (total/usdKrw).toFixed(2);
  const best = cache[key]?.items?.[0];
  el.className='calc-result show';
  el.innerHTML=`
    <div class="rrow"><span class="rl">골드 수량</span><span class="rv">${qty.toLocaleString()} G</span></div>
    <div class="rrow"><span class="rl">단가</span><span class="rv">${price.toLocaleString()}원 / 1G</span></div>
    ${best?`<div class="rrow"><span class="rl">추천 판매자</span><span class="rv green">${best.seller} (${fmtW(best.price)})</span></div>`:''}
    <div class="rrow"><span class="rl">총 비용 (원화)</span><span class="rv total">${fmtW(total)}</span></div>
    <div class="rrow"><span class="rl">총 비용 (달러)</span><span class="rv">≈ $${usd}</span></div>
    ${best?`<div style="margin-top:10px"><a class="open-all-btn" href="${best.link}" target="_blank">→ 최저가 판매자 구매</a></div>`:''}`;
}

/* ── NAVIGATION ── */
async function switchTab(key){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+key).classList.add('active');
  document.getElementById('panel-'+key).classList.add('active');
  if(!cache[key]){
    document.getElementById('panel-'+key).innerHTML=`<div class="status-box"><span class="spin"></span>가격 정보 수집중...</div>`;
    const items = await fetchListings(key);
    renderPanel(key, items);
  }
}

async function refreshTab(key){
  delete cache[key];
  document.getElementById('panel-'+key).innerHTML=`<div class="status-box"><span class="spin"></span>새로고침중...</div>`;
  const items = await fetchListings(key);
  renderPanel(key, items);
}

function setStatus(type, label){
  const d=document.getElementById('st-dot');
  d.className='bdot '+type;
  d.style.animation=(type!=='red')?'pulse 2s infinite':'none';
  document.getElementById('st-lbl').textContent=label;
}

/* ── INIT ── */
async function init(){
  fetchRate();
  document.getElementById('panel-le').innerHTML=`<div class="status-box"><span class="spin"></span>가격 정보 수집중...</div>`;
  const items = await fetchListings('le');
  renderPanel('le', items);
}
init();
</script>
